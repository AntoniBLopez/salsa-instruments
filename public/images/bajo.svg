<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300"><stop stop-color="#1a1510"/><stop offset="1" stop-color="#0c0a08"/></linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#c4783a"/><stop offset="1" stop-color="#5c3010"/></linearGradient>
    <linearGradient id="neck" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#2a1810"/><stop offset="1" stop-color="#1a1008"/></linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="255" rx="110" ry="14" fill="#000" opacity=".3"/>
  <!-- body -->
  <ellipse cx="155" cy="165" rx="85" ry="70" fill="url(#body)"/>
  <ellipse cx="155" cy="155" rx="28" ry="22" fill="#1a1008"/>
  <circle cx="155" cy="155" r="10" fill="#3a2818"/>
  <!-- neck -->
  <rect x="220" y="140" width="140" height="28" rx="4" fill="url(#neck)"/>
  <rect x="348" y="128" width="28" height="52" rx="4" fill="#d4a574"/>
  <!-- strings -->
  <g stroke="#e8d4b0" stroke-width="1.2" opacity=".7">
    <line x1="180" y1="148" x2="350" y2="148"/>
    <line x1="180" y1="155" x2="350" y2="155"/>
    <line x1="180" y1="162" x2="350" y2="162"/>
    <line x1="180" y1="169" x2="350" y2="169"/>
  </g>
  <circle cx="120" cy="140" r="5" fill="#f0b429" opacity=".5"/>
</svg>
